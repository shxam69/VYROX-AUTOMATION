    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, memo } = React;
        const { motion, AnimatePresence, useInView } = window.Motion;
        const THREE = window.THREE;
        const { gsap, ScrollTrigger } = window;
        gsap.registerPlugin(ScrollTrigger);

        // --- LASER FLOW SHADER (OPTIMIZED) ---
        const VERT = `precision highp float; attribute vec3 position; void main(){ gl_Position = vec4(position, 1.0); }`;
        const FRAG_LASER = `
        #ifdef GL_ES
        #extension GL_OES_standard_derivatives : enable
        #endif
        precision mediump float; 
        uniform float iTime; uniform vec3 iResolution; uniform float uWispDensity; uniform float uFlowTime; uniform float uBeamXFrac; uniform float uBeamYFrac; uniform float uFlowSpeed; uniform float uVLenFactor; uniform float uHLenFactor; uniform float uFogIntensity; uniform float uWSpeed; uniform float uWIntensity; uniform float uFlowStrength; uniform float uDecay; uniform float uFalloffStart; uniform vec3 uColor; uniform float uFade;
        #define PI 3.14159265359
        #define TWO_PI 6.28318530718
        #define EPS 1e-6
        #define EDGE_SOFT 0.0152
        #define DT_LOCAL 0.0038
        #define TAP_RADIUS 2 
        #define R_H 150.0
        #define R_V 150.0
        #define FLARE_HEIGHT 16.0
        #define FLARE_AMOUNT 8.0
        #define FLARE_EXP 2.0
        #define TOP_FADE_START 0.1
        #define TOP_FADE_EXP 1.0
        #define FLOW_PERIOD 0.5
        #define FLOW_SHARPNESS 1.5
        #define W_BASE_X 1.5
        #define W_LAYER_GAP 0.25
        #define W_LANES 5
        #define W_SIDE_DECAY 0.5
        #define W_HALF 0.01
        #define W_AA 0.15
        #define W_CELL 20.0
        #define W_SEG_MIN 0.01
        #define W_SEG_MAX 0.55
        #define W_CURVE_AMOUNT 15.0
        #define W_CURVE_RANGE 13.0
        #define W_BOTTOM_EXP 10.0
        float g(float x){return x<=0.00031308?12.92*x:1.055*pow(x,1.0/2.4)-0.055;}
        float bs(vec2 p,vec2 q,float powr){ float d=distance(p,q),f=powr*uFalloffStart,r=(f*f)/(d*d+EPS); return powr*min(1.0,r); }
        float bsa(vec2 p,vec2 q,float powr,vec2 s){ vec2 d=p-q; float dd=(d.x*d.x)/(s.x*s.x)+(d.y*d.y)/(s.y*s.y),f=powr*uFalloffStart,r=(f*f)/(dd+EPS); return powr*min(1.0,r); }
        float tri01(float x){float f=fract(x);return 1.0-abs(f*2.0-1.0);}
        float tauWf(float t,float tmin,float tmax){float a=smoothstep(tmin,tmin+EDGE_SOFT,t),b=1.0-smoothstep(tmax-EDGE_SOFT,tmax,t);return max(0.0,a*b);} 
        float h21(vec2 p){p=fract(p*vec2(123.34,456.21));p+=dot(p,p+34.123);return fract(p.x*p.y);}
        float rGate(float x,float l){float a=smoothstep(0.0,W_AA,x),b=1.0-smoothstep(l,l+W_AA,x);return max(0.0,a*b);}
        float flareY(float y){float t=clamp(1.0-(clamp(y,0.0,FLARE_HEIGHT)/max(FLARE_HEIGHT,EPS)),0.0,1.0);return pow(t,FLARE_EXP);}
        float vWisps(vec2 uv,float topF){ float y=uv.y,yf=(y+uFlowTime*uWSpeed)/W_CELL; float d=max(uWispDensity,1.0); int lanes=int(max(1.0,floor(float(W_LANES)*min(d,1.0)))); float sum=0.0;
            float fm=flareY(max(y,0.0)),rm=clamp(1.0-(y/max(W_CURVE_RANGE,EPS)),0.0,1.0),cm=fm*rm; float xS=1.0+(FLARE_AMOUNT*W_CURVE_AMOUNT*0.05)*cm;
            float bGain=pow(1.0-clamp(y/R_V,0.0,1.0),W_BOTTOM_EXP);
            for(int s=0;s<2;++s){ float sgn=s==0?-1.0:1.0;
                for(int i=0;i<W_LANES;++i){ if(i>=lanes) break; float off=W_BASE_X+float(i)*W_LAYER_GAP,xc=sgn*(off*xS); float dx=abs(uv.x-xc),lat=1.0-smoothstep(W_HALF,W_HALF+W_AA,dx),amp=exp(-off*W_SIDE_DECAY);
                    float seed=h21(vec2(off,sgn*17.0)),yf2=yf+seed*7.0,ci=floor(yf2),fy=fract(yf2); float seg=mix(W_SEG_MIN,W_SEG_MAX,h21(vec2(ci,off*2.3))); float spR=h21(vec2(ci,off+sgn*31.0));
                    sum+=amp*lat*rGate(fy,seg)*step(spR,min(d,1.0)); } }
            return uWIntensity*sum*topF*bGain*smoothstep(-3.0,0.0,y)*(1.0-smoothstep(R_V-6.0,R_V,y)); }
        void mainImage(out vec4 fc,in vec2 frag){
            vec2 C=iResolution.xy*.5; float sc=512.0/iResolution.x*.4; vec2 uv=(frag-C)*sc,uvc=uv-vec2(uBeamXFrac*iResolution.x*sc,uBeamYFrac*iResolution.y*sc);
            float a=0.0,b=0.0; float basePhase=1.5*PI+uDecay*.5,tauMin=basePhase-uDecay,tauMax=basePhase;
            float cx=clamp(uvc.x/(R_H*uHLenFactor),-1.0,1.0),tH=clamp(TWO_PI-acos(cx),tauMin,tauMax);
            for(int k=-TAP_RADIUS;k<=TAP_RADIUS;++k){ float tu=tH+float(k)*DT_LOCAL,wt=tauWf(tu,tauMin,tauMax); if(wt<=0.0) continue; float spd=max(abs(sin(tu)),0.02),u=clamp((basePhase-tu)/max(uDecay,EPS),0.0,1.0); a+=wt*bs(uvc,vec2((R_H*uHLenFactor)*cos(tu),0.0),pow(1.0-abs(u*2.0-1.0),0.8)*spd); }
            float yPix=uvc.y,cy=clamp(-yPix/(R_V*uVLenFactor),-1.0,1.0),tV=clamp(TWO_PI-acos(cy),tauMin,tauMax);
            for(int k=-TAP_RADIUS;k<=TAP_RADIUS;++k){ float tu=tV+float(k)*DT_LOCAL,wt=tauWf(tu,tauMin,tauMax); if(wt<=0.0) continue; float yb=(-R_V)*cos(tu),s=clamp(yb/R_V,0.0,1.0),spd=max(abs(sin(tu)),0.02);
                float env=pow(1.0-s,0.6)*spd*pow(1.0-smoothstep(TOP_FADE_START,1.0,s),TOP_FADE_EXP); env*=mix(1.0-uFlowStrength,1.0,pow(tri01(s/max(FLOW_PERIOD,EPS)+uFlowTime*uFlowSpeed),FLOW_SHARPNESS));
                float yp=(-R_V*uVLenFactor)*cos(tu),m=pow(smoothstep(FLARE_HEIGHT,0.0,yp),FLARE_EXP); b+=wt*bsa(uvc,vec2(0.0,yp),step(0.0,yp)*env,vec2(1.0+FLARE_AMOUNT*m,1.0)); }
            float topA=pow(1.0-smoothstep(TOP_FADE_START,1.0,clamp(yPix/R_V,0.0,1.0)),TOP_FADE_EXP); float L=a+b*topA,w=vWisps(vec2(uvc.x,yPix),topA);
            vec3 col=g(L+w)*uColor; float alpha=clamp(g(L+w*0.6),0.0,1.0);
            fc=vec4(col,alpha)*uFade;
        }
        void main(){ vec4 fc; mainImage(fc, gl_FragCoord.xy); gl_FragColor = fc; }
        `;

        // Memoized to prevent re-renders on state change
        const LaserFlow = memo(({ wispDensity=1, horizontalBeamOffset=0.1, verticalBeamOffset=0.0, flowSpeed=0.35, verticalSizing=2.0, horizontalSizing=0.5, wispSpeed=15.0, wispIntensity=5.0, flowStrength=0.25, decay=1.1, falloffStart=1.2, color='#A855F7' }) => {
            const mountRef = useRef(null);
            const hexToRGB = hex => {
                let c = hex.trim(); if(c[0]==='#') c=c.slice(1);
                if(c.length===3) c=c.split('').map(x=>x+x).join('');
                const n=parseInt(c,16)||0xffffff; return {r:((n>>16)&255)/255,g:((n>>8)&255)/255,b:(n&255)/255};
            };

            useEffect(()=>{
                if(!mountRef.current) return;
                const mount = mountRef.current;
                const renderer = new THREE.WebGLRenderer({ antialias:false, alpha:true, powerPreference:'high-performance' });
                renderer.setPixelRatio(1); 
                renderer.setSize(mount.clientWidth, mount.clientHeight);
                mount.appendChild(renderer.domElement);

                const scene = new THREE.Scene();
                const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array([-1,-1,0, 3,-1,0, -1,3,0]),3));
                const uniforms = {
                    iTime:{value:0}, iResolution:{value:new THREE.Vector3(mount.clientWidth,mount.clientHeight,1)},
                    uWispDensity:{value:wispDensity}, uFlowTime:{value:0},
                    uBeamXFrac:{value:horizontalBeamOffset}, uBeamYFrac:{value:verticalBeamOffset},
                    uFlowSpeed:{value:flowSpeed}, uVLenFactor:{value:verticalSizing}, uHLenFactor:{value:horizontalSizing},
                    uWSpeed:{value:wispSpeed},
                    uWIntensity:{value:wispIntensity}, uFlowStrength:{value:flowStrength}, uDecay:{value:decay},
                    uFalloffStart:{value:falloffStart}, uColor:{value:new THREE.Vector3()}, uFade:{value:0}
                };
                const material = new THREE.RawShaderMaterial({ vertexShader:VERT, fragmentShader:FRAG_LASER, uniforms, transparent:true, depthTest:false, blending:THREE.AdditiveBlending });
                const mesh = new THREE.Mesh(geometry, material); scene.add(mesh);
                const clock = new THREE.Clock(); let raf=0;

                const animate = () => {
                    raf = requestAnimationFrame(animate);
                    const dt = clock.getDelta();
                    uniforms.iTime.value = clock.getElapsedTime();
                    uniforms.uFlowTime.value += dt;
                    if(uniforms.uFade.value < 1) uniforms.uFade.value += dt * 0.5;
                    renderer.render(scene, camera);
                };
                animate();
                const {r,g,b} = hexToRGB(color); uniforms.uColor.value.set(r,g,b);
                const resize = () => { if(mount){ renderer.setSize(mount.clientWidth, mount.clientHeight); uniforms.iResolution.value.set(mount.clientWidth, mount.clientHeight, 1); } };
                window.addEventListener('resize', resize);
                return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); if(renderer && mount) mount.removeChild(renderer.domElement); geometry.dispose(); material.dispose(); renderer.dispose(); };
            },[]);
            return <div ref={mountRef} className="laser-flow-container" />;
        });

        // Memoized to prevent re-renders on inputs
        const GhostCursor = memo(({ trailLength = 20, inertia = 0.92, bloomStrength = 0.1, bloomRadius = 0.5, bloomThreshold = 0.1, brightness = 0.30, color = '#B19EEF' }) => {
            const mountRef = useRef(null);
            const trailBufRef = useRef(Array.from({ length: 30 }, () => new THREE.Vector2(0.5, 0.5)));
            const headRef = useRef(0);
            const currentMouseRef = useRef(new THREE.Vector2(0.5, 0.5));
            const velocityRef = useRef(new THREE.Vector2(0, 0));
            const fadeOpacityRef = useRef(1.0);
            const lastMoveTimeRef = useRef(Date.now());

            useEffect(() => {
                const mount = mountRef.current;
                const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true, powerPreference: 'high-performance' });
                renderer.setPixelRatio(1);
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setClearColor(0x000000, 0);
                mount.appendChild(renderer.domElement);

                const scene = new THREE.Scene();
                const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
                const baseColor = new THREE.Color(color);
                const fragmentShader = `
                    uniform float iTime; uniform vec3 iResolution; uniform vec2 iMouse; uniform vec2 iPrevMouse[30]; uniform float iOpacity; uniform vec3 iBaseColor; uniform float iBrightness;
                    varying vec2 vUv;
                    float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7))) * 43758.5453123); }
                    float noise(vec2 p){ vec2 i = floor(p), f = fract(p); f *= f * (3. - 2. * f); return mix(mix(hash(i + vec2(0.,0.)), hash(i + vec2(1.,0.)), f.x), mix(hash(i + vec2(0.,1.)), hash(i + vec2(1.,1.)), f.x), f.y); }
                    float fbm(vec2 p){ float v = 0.0; float a = 0.5; mat2 m = mat2(0.87, 0.48, -0.48, 0.87); for(int i=0;i<5;i++){ v += a * noise(p); p = m * p * 2.0; a *= 0.5; } return v; }
                    vec4 blob(vec2 p, vec2 mousePos, float intensity, float activity) { vec2 q = vec2(fbm(p * 2.0 + iTime * 0.2), fbm(p * 2.0 + vec2(5.2,1.3) + iTime * 0.2)); vec2 r = vec2(fbm(p * 2.0 + q * 1.5 + iTime * 0.3), fbm(p * 2.0 + q * 1.5 + vec2(8.3,2.8) + iTime * 0.3)); float smoke = fbm(p * 3.0 + r * 1.0); float d = length(p - mousePos); float distFactor = 1.0 / (1.0 + d * 15.0); float alpha = pow(smoke, 1.5) * distFactor * 2.5; return vec4(iBaseColor * alpha * intensity, alpha * intensity); }
                    void main() { vec2 uv = vUv; vec2 aspect = vec2(iResolution.x / iResolution.y, 1.0); vec2 p = (uv * 2.0 - 1.0) * aspect; vec2 mouse = (iMouse * 2.0 - 1.0) * aspect; vec3 colorAcc = vec3(0.0); float alphaAcc = 0.0; vec4 b = blob(p, mouse, 1.0, iOpacity); colorAcc += b.rgb; alphaAcc += b.a; for (int i = 0; i < 30; i++) { vec2 pm = (iPrevMouse[i] * 2.0 - 1.0) * aspect; float t = 1.0 - float(i) / 30.0; t = pow(t, 2.0); if (t > 0.01) { vec4 bt = blob(p, pm, t * 0.5, iOpacity); colorAcc += bt.rgb; alphaAcc += bt.a; } } gl_FragColor = vec4(colorAcc * iBrightness, alphaAcc * iOpacity); }
                `;
                const material = new THREE.ShaderMaterial({
                    uniforms: { iTime: { value: 0 }, iResolution: { value: new THREE.Vector3(window.innerWidth, window.innerHeight, 1) }, iMouse: { value: new THREE.Vector2(0.5, 0.5) }, iPrevMouse: { value: trailBufRef.current }, iOpacity: { value: 1.0 }, iBaseColor: { value: baseColor }, iBrightness: { value: brightness } },
                    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
                    fragmentShader: fragmentShader, transparent: true, depthTest: false, depthWrite: false, blending: THREE.AdditiveBlending
                });
                const plane = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material); scene.add(plane);

                const composer = new THREE.EffectComposer(renderer);
                composer.addPass(new THREE.RenderPass(scene, camera));
                composer.addPass(new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), bloomStrength, bloomRadius, bloomThreshold));
                
                const onMove = (e) => { currentMouseRef.current.set(e.clientX/window.innerWidth, 1.0-(e.clientY/window.innerHeight)); lastMoveTimeRef.current = performance.now(); fadeOpacityRef.current = 1.0; };
                window.addEventListener('mousemove', onMove);
                const onResize = () => { renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight); material.uniforms.iResolution.value.set(window.innerWidth, window.innerHeight, 1); };
                window.addEventListener('resize', onResize);
                
                const clock = new THREE.Clock(); let raf;
                const animate = () => {
                    raf = requestAnimationFrame(animate);
                    const time = clock.getElapsedTime();
                    const target = currentMouseRef.current, current = material.uniforms.iMouse.value;
                    velocityRef.current.set(target.x - current.x, target.y - current.y).multiplyScalar(1 - inertia);
                    current.add(velocityRef.current);
                    
                    headRef.current = (headRef.current + 1) % 30;
                    trailBufRef.current[headRef.current].copy(current);
                    const arr = material.uniforms.iPrevMouse.value;
                    for(let i=0; i<30; i++) { arr[i].copy(trailBufRef.current[(headRef.current - i + 30) % 30]); }

                    if(performance.now() - lastMoveTimeRef.current > 1000) fadeOpacityRef.current = Math.max(0, fadeOpacityRef.current - 0.02);
                    material.uniforms.iTime.value = time; material.uniforms.iOpacity.value = fadeOpacityRef.current;
                    composer.render();
                };
                animate();
                return () => { cancelAnimationFrame(raf); window.removeEventListener('mousemove', onMove); window.removeEventListener('resize', onResize); mount.removeChild(renderer.domElement); };
            }, [color]);
            return <div ref={mountRef} className="ghost-cursor-container" />;
        });

                                <span className="text-[#A855F7] text-[12vw] md:text-[140px] font-black leading-none ml-1">X</span>
                            </motion.div>

                            <motion.div initial={{x: -100, opacity: 0}} animate={{x: 0, opacity: 1}} transition={{delay: 2.2, duration: 1.5, ease: [0.25, 0.1, 0.25, 1]}} className="px-8 py-3 rounded-full bg-white/5 backdrop-blur-xl border border-white/10 text-xs tracking-widest uppercase mb-8 flex items-center gap-3 shadow-2xl">
                                <span className="w-8 h-[1px] bg-white/30"></span>Whatsapp Automation<span className="w-8 h-[1px] bg-white/30"></span>
                            </motion.div>

                            <motion.button initial={{x: 100, opacity: 0}} animate={{x: 0, opacity: 1}} transition={{delay: 2.4, duration: 1.5, ease: [0.25, 0.1, 0.25, 1]}} onClick={handleExplore} className="px-8 py-3 bg-white/10 backdrop-blur-xl border border-white/20 text-white hover:bg-[#A855F7] hover:text-black font-bold text-sm rounded-full shadow-lg transition-all duration-500 hover:scale-105">
                                Explore Services
                            </motion.button>
                        </div>
                    </section>

                    {/* CONTENT */}
                    {explored && (
                        <motion.main initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ duration: 1.8, ease: [0.22, 1, 0.36, 1] }} className="relative z-10 bg-[#020202] min-h-screen pt-20 px-6 border-t border-white/5 shadow-[0_-50px_100px_rgba(0,0,0,1)]">
                            <div className="max-w-5xl mx-auto space-y-32">
                                
                                <div ref={chatSectionRef} className="grid md:grid-cols-2 gap-12 items-center">
                                    <ScrollReveal direction="left">
                                        <h2 className="text-4xl md:text-5xl font-bold mb-6">Automate your <span className="text-[#A855F7]">Conversations</span></h2>
                                        <p className="text-gray-400 text-lg leading-relaxed mb-8 font-light">Engage customers instantly, 24/7. Our AI agents handle inquiries, qualify leads, and book meetings directly on WhatsApp without human intervention.</p>
                                        <div className="flex gap-4">{['Instant Reply', 'Lead Qual', 'Auto Booking'].map(t=><span key={t} className="px-4 py-2 rounded-full bg-white/5 border border-white/10 text-xs font-medium text-gray-300">{t}</span>)}</div>
                                    </ScrollReveal>
                                    <ScrollReveal direction="right"><div className="glow-visible rounded-3xl overflow-hidden border border-white/10"><DemoChat /></div></ScrollReveal>
                                </div>

                                <ScrollReveal direction="right">
                                    {/* Pass the plan name to the modal handler */}
                                    <PlanRecommender onPlanSelected={(planName) => setShowModal(planName)} />
                                </ScrollReveal>

                                <ScrollReveal direction="left">
                                    <div className="relative">
                                        <div className="absolute -inset-10 bg-[#A855F7]/10 blur-[100px] rounded-full pointer-events-none"></div>
                                        <h2 className="text-4xl font-bold text-center mb-4 relative z-10">Plans & Pricing</h2>
                                        <p className="text-center text-gray-400 mb-12 max-w-lg mx-auto relative z-10">Choose the automation scale that fits your business needs.</p>
                                        <div className="grid md:grid-cols-3 gap-6 relative z-10">
                                            {plans.map((p,i)=>(
                                                <div key={i} className="plan-card-glow p-8 rounded-[24px] bg-[#0a0a0a] border border-white/10 cursor-pointer relative overflow-hidden group">
                                                    <div className="absolute top-0 right-0 w-20 h-20 bg-[#A855F7]/10 blur-xl rounded-full -mr-10 -mt-10 transition-all group-hover:bg-[#A855F7]/20"></div>
                                                    <h3 className="plan-title text-xl font-bold mb-2 text-white transition-all duration-300">{p.name}</h3>
                                                    
                                                    {/* DISCOUNT BADGE */}
                                                    <div className="flex items-center gap-2 mb-1">
                                                        <span className="text-gray-500 line-through text-sm">₹{p.price * 2}</span>
                                                        <span className="bg-[#A855F7]/20 text-[#A855F7] text-[10px] px-2 py-0.5 rounded-full font-bold">50% OFF</span>
                                                    </div>

                                                    <div className="flex items-baseline gap-1 mb-6"><span className="text-3xl font-bold text-white">₹{p.price}</span><span className="text-gray-500 text-xs">/mo</span></div>
                                                    <div className="h-[1px] w-full bg-white/5 mb-6"></div>
                                                    <ul className="space-y-4 mb-8">
                                                        {p.features.map(f=><li key={f} className="text-gray-300 text-sm flex gap-3 items-center"><span className="text-[#A855F7] bg-[#A855F7]/10 w-5 h-5 rounded-full flex items-center justify-center text-[10px]">✓</span> {f}</li>)}
                                                    </ul>
                                                    <div className="flex gap-2">
                                                        <button onClick={(e)=>{e.stopPropagation(); setViewDetailsPlan(p)}} className="flex-1 py-3 rounded-xl border border-white/20 text-white font-bold text-sm hover:border-[#A855F7] hover:text-[#A855F7] transition-all duration-300">View Details</button>
                                                        <button onClick={()=>setShowModal(p.name)} className="flex-1 py-3 rounded-xl bg-white text-black font-bold text-sm hover:bg-[#A855F7] hover:text-white transition-all duration-300 shadow-lg">Get Started</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </ScrollReveal>

                                <ScrollReveal direction="right">
                                    <ComparisonTable />
                                </ScrollReveal>

                                <ScrollReveal direction="left">
                                    <div className="max-w-3xl mx-auto">
                                        <h2 className="text-3xl font-bold mb-8 text-center">FAQ</h2>
                                        <div className="space-y-4">
                                            <FAQItem q="How fast is the setup?" a="Most clients are live within 24-48 hours after linking their WhatsApp Business API account." />
                                            <FAQItem q="Can I scale indefinitely?" a="Yes, our infrastructure is built on cloud-native architecture supporting unlimited concurrent conversations." />
                                            <FAQItem q="Is it Meta approved?" a="100% compliant. We use official WhatsApp Business APIs to ensure zero risk of banning." />
                                            <FAQItem q="Do I need coding skills?" a="No, our platform is designed with a no-code drag-and-drop interface." />
                                            <FAQItem q="Is my data secure?" a="Absolutely. We use end-to-end encryption and are GDPR compliant." />
                                        </div>
                                    </div>
                                </ScrollReveal>
                            </div>
                            
                            <footer className="py-24 text-center border-t border-white/5 mt-32 relative overflow-hidden bg-black flex flex-col items-center justify-center">
                                <ScrollReveal direction="up">
                                    <div className="relative z-10 mb-8 select-none"><ScrollFloat>VYROX</ScrollFloat></div>
                                </ScrollReveal>
                                <div className="relative z-10 flex gap-6 mb-16 overflow-hidden p-4">
                                    <motion.button initial={{x: 50, opacity: 0}} whileInView={{x: 0, opacity: 1}} viewport={{once: false}} transition={{duration: 1.2, ease: "easeOut"}} onClick={()=>setShowModal('Enterprise')} className="px-8 py-3 rounded-full bg-[#A855F7] text-black font-bold hover:bg-[#9333ea] transition-all shadow-lg hover:scale-105">
                                            Book Demo
                                    </motion.button>
                                    <motion.button 
                                        initial={{x: -50, opacity: 0}} 
                                        whileInView={{x: 0, opacity: 1}} 
                                        viewport={{once: false}} 
                                        transition={{duration: 1.2, ease: "easeOut"}} 
                                        onClick={() => window.location.href = 'mailto:vyrox.saas@gmail.com'}
                                        className="px-8 py-3 rounded-full border border-white/20 hover:border-white text-gray-300 hover:text-white transition-all flex items-center justify-center cursor-pointer"
                                    >
                                            Contact Sales
                                    </motion.button>
                                </div>
                                <div className="flex gap-8 text-gray-500 text-xs uppercase tracking-wider relative z-10 mb-8">
                                    <a href="#" className="hover:text-[#A855F7] transition-colors">Privacy Policy</a>
                                    <a href="#" className="hover:text-[#A855F7] transition-colors">Terms & Conditions</a>
                                    <a href="#" className="hover:text-[#A855F7] transition-colors">Copyright</a>
                                </div>
                                <div className="absolute right-0 top-0 w-full h-full z-0 opacity-20 pointer-events-none"><LaserFlow color="#A855F7" flowSpeed={0.2} wispDensity={2.0} verticalSizing={4.0} horizontalBeamOffset={0.305} verticalBeamOffset={0.00} /></div>
                            </footer>
                        </motion.main>
                    )}

                    {/* Modals */}
                    <AnimatePresence>
                        {/* Success Modal */}
                        {successModal && <SuccessModal onClose={()=>setSuccessModal(false)} />}
                        
                        {/* Checkout Modal */}
                        {showModal && (
                            <CheckoutModal plan={showModal} onClose={()=>setShowModal(null)} onSuccess={handleSuccess} />
                        )}
                        {/* Contact Modal */}
                        {contactModal && (
                            <ContactModal onClose={()=>setContactModal(false)} onSuccess={handleSuccess} />
                        )}
                        {/* View Details Modal */}
                        {viewDetailsPlan && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-md p-4" onClick={()=>setViewDetailsPlan(null)}>
                                <motion.div initial={{scale:0.9,opacity:0}} animate={{scale:1,opacity:1}} exit={{scale:0.9,opacity:0}} onClick={e=>e.stopPropagation()} className="bg-[#0a0a0a] border border-[#A855F7]/30 p-8 rounded-3xl max-w-md w-full shadow-2xl relative overflow-hidden">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-2xl font-bold text-white">{viewDetailsPlan.name} Features</h2>
                                        <button onClick={()=>setViewDetailsPlan(null)} className="text-gray-400 hover:text-white">✕</button>
                                    </div>
                                    <ul className="space-y-3 mb-8">
                                        {viewDetailsPlan.allFeatures.map((feature, idx) => (
                                            <li key={idx} className="flex gap-3 text-sm text-gray-300">
                                                <span className="text-[#A855F7]">✓</span> {feature}
                                            </li>
                                        ))}
                                    </ul>
                                    <button onClick={()=>{setViewDetailsPlan(null); setShowModal(viewDetailsPlan.name)}} className="w-full py-3 rounded-xl bg-[#A855F7] text-white font-bold text-sm shadow-lg hover:shadow-[#A855F7]/20 transition-all">Get Started with {viewDetailsPlan.name}</button>
                                </motion.div>
                            </div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
